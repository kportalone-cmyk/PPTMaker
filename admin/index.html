<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Portal PPTMaker - 관리자</title>
    <link rel="icon" href="/front/img/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
    <!-- 헤더 -->
    <div class="header">
        <div style="display:flex;align-items:center;gap:16px;">
            <h1>K-Portal PPTMaker 관리자</h1>
            <button class="header-btn" onclick="showFontManageModal()" title="폰트 관리">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v2H5.5L4 12h1.5v2H2v-2h1.2L5 4H3V2zm7 0h5v2h-1l-2.5 10H12v2H7.5v-2h1.2L11.2 4H9V2z"/></svg>
                폰트 관리
            </button>
        </div>
        <div class="user-info" id="userInfo"></div>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="main-container">
        <!-- 좌측 사이드바: 템플릿 & 슬라이드 목록 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>템플릿</h2>
                <button class="btn btn-primary" style="padding:4px 10px;font-size:12px;" onclick="showNewTemplateModal()">+ 새 템플릿</button>
            </div>
            <!-- 템플릿 선택 콤보박스 -->
            <div style="padding:8px;">
                <div class="template-combo" id="templateCombo">
                    <div class="template-combo-selected" id="templateComboSelected" onclick="toggleTemplateDropdown()">
                        <span id="templateComboText">템플릿을 선택하세요</span>
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="#888"><path d="M2 4l4 4 4-4z"/></svg>
                    </div>
                    <div class="template-combo-dropdown" id="templateComboDropdown">
                        <div id="templateList"></div>
                    </div>
                </div>
            </div>

            <div id="slideSection" style="display:none;">
                <div class="sidebar-header" style="border-top:1px solid #e0e0e0;">
                    <h2>슬라이드</h2>
                    <button class="btn btn-primary" style="padding:4px 10px;font-size:12px;" onclick="addSlide()">+ 추가</button>
                </div>
                <div id="slideList" class="sidebar-list"></div>
            </div>
        </div>

        <!-- 콘텐츠 영역 -->
        <div class="content-area">
            <!-- 툴바 -->
            <div class="toolbar" id="toolbar" style="display:none;">
                <button class="btn" onclick="addTextObject()" title="텍스트 추가">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v2H9v8H7V5H2V3z"/></svg>
                    텍스트
                </button>
                <button class="btn" onclick="triggerImageUpload()" title="이미지 추가">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M14 2H2a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1V3a1 1 0 00-1-1zm-1 10H3l3-4 2 2.5L11 7l2 5z"/></svg>
                    이미지
                </button>
                <input type="file" id="imageUploadInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                <div class="shape-dropdown-wrapper">
                    <button class="btn" onclick="toggleShapeDropdown()" title="도형 추가">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/></svg>
                        도형 ▾
                    </button>
                    <div id="shapeDropdown" class="shape-dropdown" style="display:none;">
                        <button onclick="addShapeObject('rectangle')" title="사각형">
                            <svg width="20" height="20" viewBox="0 0 20 20"><rect x="2" y="4" width="16" height="12" fill="none" stroke="#333" stroke-width="1.5"/></svg>
                            사각형
                        </button>
                        <button onclick="addShapeObject('rounded_rectangle')" title="둥근 사각형">
                            <svg width="20" height="20" viewBox="0 0 20 20"><rect x="2" y="4" width="16" height="12" rx="3" fill="none" stroke="#333" stroke-width="1.5"/></svg>
                            둥근 사각형
                        </button>
                        <button onclick="addShapeObject('ellipse')" title="원/타원">
                            <svg width="20" height="20" viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="8" ry="6" fill="none" stroke="#333" stroke-width="1.5"/></svg>
                            원/타원
                        </button>
                        <button onclick="addShapeObject('line')" title="직선">
                            <svg width="20" height="20" viewBox="0 0 20 20"><line x1="2" y1="16" x2="18" y2="4" stroke="#333" stroke-width="1.5"/></svg>
                            직선
                        </button>
                        <button onclick="addShapeObject('arrow')" title="화살표">
                            <svg width="20" height="20" viewBox="0 0 20 20"><line x1="2" y1="14" x2="16" y2="4" stroke="#333" stroke-width="1.5"/><polygon points="16,4 11,5 14,8" fill="#333"/></svg>
                            화살표
                        </button>
                    </div>
                </div>
                <div class="separator"></div>
                <button class="btn" id="btnGridToggle" onclick="toggleGrid()" title="격자/눈금자 토글">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1h16v1H0V1zm0 4h16v1H0V5zm0 4h16v1H0V9zm0 4h16v1H0v-1z" opacity="0.4"/><path d="M1 0v16h1V0H1zm4 0v16h1V0H5zm4 0v16h1V0H9zm4 0v16h1V0h-1z" opacity="0.4"/></svg>
                    격자
                </button>
                <div class="separator"></div>
                <button class="btn" onclick="uploadBackground()" title="배경 이미지 업로드">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2h14v12H1V2zm1 1v8.5l3.5-4 2.5 3 3-4L14 11V3H2z"/></svg>
                    배경
                </button>
                <button class="btn btn-danger" onclick="removeBackground()" id="btnRemoveBg" style="display:none;" title="배경 이미지 제거">
                    배경 제거
                </button>
                <button class="btn" onclick="removeSlideBackground()" id="btnRemoveSlideBg" style="display:none;color:#e67e22;border-color:#e67e22;font-size:12px;" title="이 슬라이드 배경 해제">
                    슬라이드 배경 해제
                </button>
                <input type="file" id="bgUploadInput" accept="image/*" style="display:none;" onchange="handleBgUpload(event)">
                <div class="separator"></div>
                <button class="btn btn-primary" onclick="saveSlide()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V3a2 2 0 00-2-2zm-1 4H4V3h8v2zm0 8H4V7h8v6z"/></svg>
                    저장
                </button>
                <button class="btn btn-danger" onclick="deleteCurrentSlide()" id="btnDeleteSlide" style="display:none;">삭제</button>
                <div style="flex:1;"></div>
                <button class="btn btn-danger" onclick="deleteCurrentTemplate()" id="btnDeleteTemplate" style="display:none;">템플릿 삭제</button>
            </div>

            <!-- 캔버스 -->
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="empty-state" id="emptyState">
                    <div class="icon">📊</div>
                    <p>템플릿을 선택하거나 새 템플릿을 생성하세요</p>
                    <p style="font-size:13px;color:#bbb;">관리자 권한이 필요합니다</p>
                </div>
                <div class="canvas-container" id="canvas" style="display:none;">
                    <div class="canvas-grid grid-50" id="canvasGrid"></div>
                    <div class="canvas-bg" id="canvasBg"></div>
                </div>
            </div>
        </div>

        <!-- 우측 속성 패널 -->
        <div class="properties-panel" id="propertiesPanel" style="display:none;">
            <h3>오브젝트 속성</h3>

            <div id="objProperties" style="display:none;">
                <div class="prop-group">
                    <label>역할 (추천용)</label>
                    <select id="propRole" onchange="updateObjProperty('role', this.value)">
                        <option value="">선택안함</option>
                        <option value="title">제목</option>
                        <option value="governance">거버넌스</option>
                        <option value="subtitle">부제목</option>
                        <option value="body">본문</option>
                        <option value="description">설명</option>
                    </select>
                </div>
                <div class="prop-group">
                    <label>플레이스홀더 이름</label>
                    <input type="text" id="propPlaceholder" onchange="updateObjProperty('placeholder', this.value)" placeholder="예: main_title">
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>X</label>
                        <input type="number" id="propX" onchange="updateObjPosition()">
                    </div>
                    <div class="prop-group">
                        <label>Y</label>
                        <input type="number" id="propY" onchange="updateObjPosition()">
                    </div>
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>너비</label>
                        <input type="number" id="propW" onchange="updateObjPosition()">
                    </div>
                    <div class="prop-group">
                        <label>높이</label>
                        <input type="number" id="propH" onchange="updateObjPosition()">
                    </div>
                </div>
            </div>

            <!-- 이미지 전용 속성 -->
            <div id="imageProperties" style="display:none;">
                <h3 style="margin-top:16px;">이미지 설정</h3>
                <div class="prop-group">
                    <label>이미지 맞춤</label>
                    <select id="propImageFit" onchange="updateImageFit(this.value)">
                        <option value="contain">원본 비율 유지</option>
                        <option value="cover">영역에 맞춤 (잘림 가능)</option>
                    </select>
                </div>
                <div class="prop-group" style="margin-top:12px;">
                    <button class="btn" onclick="setImageAsBackground()" style="width:100%;padding:8px;font-size:13px;background:#2d5a8e;color:#fff;border:none;border-radius:4px;cursor:pointer;">
                        배경으로 설정
                    </button>
                </div>
            </div>

            <!-- 텍스트 전용 속성 -->
            <div id="textProperties" style="display:none;">
                <h3 style="margin-top:16px;">텍스트 스타일</h3>
                <div class="prop-group">
                    <label>폰트</label>
                    <select id="propFont" onchange="updateTextStyle('font_family', this.value)">
                        <option value="Arial">Arial</option>
                        <option value="맑은 고딕">맑은 고딕</option>
                    </select>
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>크기</label>
                        <input type="number" id="propFontSize" value="16" min="8" max="120" onchange="updateTextStyle('font_size', parseInt(this.value))">
                    </div>
                    <div class="prop-group">
                        <label>색상</label>
                        <input type="color" id="propColor" value="#000000" onchange="updateTextStyle('color', this.value)">
                    </div>
                </div>
                <div class="prop-row" style="gap:6px;">
                    <button type="button" class="style-toggle" id="propBold" onclick="toggleBold()" title="굵게">
                        <b>B</b>
                    </button>
                    <button type="button" class="style-toggle" id="propItalic" onclick="toggleItalic()" title="기울임">
                        <i>I</i>
                    </button>
                </div>
                <div class="prop-group">
                    <label>정렬</label>
                    <select id="propAlign" onchange="updateTextStyle('align', this.value)">
                        <option value="left">왼쪽</option>
                        <option value="center">가운데</option>
                        <option value="right">오른쪽</option>
                    </select>
                </div>
                <div class="prop-group">
                    <label>텍스트 내용</label>
                    <textarea id="propTextContent" rows="3" onchange="updateTextContent(this.value)" style="width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;resize:vertical;"></textarea>
                </div>
            </div>

            <!-- 도형 전용 속성 -->
            <div id="shapeProperties" style="display:none;">
                <h3 style="margin-top:16px;">도형 스타일</h3>
                <div class="prop-group">
                    <label>도형 유형</label>
                    <select id="propShapeType" onchange="updateShapeStyle('shape_type', this.value)">
                        <option value="rectangle">사각형</option>
                        <option value="rounded_rectangle">둥근 사각형</option>
                        <option value="ellipse">원/타원</option>
                        <option value="line">직선</option>
                        <option value="arrow">화살표</option>
                    </select>
                </div>
                <div class="prop-row" id="shapeFillRow">
                    <div class="prop-group">
                        <label>채우기 색상</label>
                        <input type="color" id="propFillColor" value="#4A90D9" onchange="updateShapeStyle('fill_color', this.value)">
                    </div>
                    <div class="prop-group">
                        <label>투명도 <span id="opacityVal">100</span>%</label>
                        <input type="range" id="propFillOpacity" min="0" max="100" value="100" oninput="$('#opacityVal').text(this.value)" onchange="updateShapeStyle('fill_opacity', this.value / 100)" style="width:100%;">
                    </div>
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>테두리 색상</label>
                        <input type="color" id="propStrokeColor" value="#333333" onchange="updateShapeStyle('stroke_color', this.value)">
                    </div>
                    <div class="prop-group">
                        <label>테두리 두께</label>
                        <input type="number" id="propStrokeWidth" value="2" min="0" max="20" onchange="updateShapeStyle('stroke_width', parseInt(this.value))">
                    </div>
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>선 스타일</label>
                        <select id="propStrokeDash" onchange="updateShapeStyle('stroke_dash', this.value)">
                            <option value="solid">실선</option>
                            <option value="dashed">점선</option>
                            <option value="dotted">점점선</option>
                        </select>
                    </div>
                    <div class="prop-group" id="borderRadiusGroup">
                        <label>모서리 반경</label>
                        <input type="number" id="propBorderRadius" value="12" min="0" max="100" onchange="updateShapeStyle('border_radius', parseInt(this.value))">
                    </div>
                </div>
                <div class="prop-group" id="arrowHeadGroup" style="display:none;">
                    <label>화살표 머리</label>
                    <select id="propArrowHead" onchange="updateShapeStyle('arrow_head', this.value)">
                        <option value="end">끝에만</option>
                        <option value="both">양쪽</option>
                    </select>
                </div>
            </div>

            <!-- 슬라이드 메타 정보 -->
            <div id="slideMetaPanel" style="margin-top:24px;">
                <h3>슬라이드 메타정보</h3>
                <div class="slide-meta-form">
                    <div class="meta-field">
                        <label>콘텐츠 유형</label>
                        <select id="metaContentType" onchange="updateSlideMeta()">
                            <option value="title_slide">타이틀 슬라이드</option>
                            <option value="toc">목차 슬라이드</option>
                            <option value="section_divider">섹션 간지</option>
                            <option value="body" selected>본문 슬라이드</option>
                            <option value="closing">마무리 슬라이드</option>
                        </select>
                        <div id="metaTypeGuide" class="meta-type-guide" style="display:none;"></div>
                    </div>
                    <div class="meta-field">
                        <label>레이아웃</label>
                        <select id="metaLayout" onchange="updateSlideMeta()">
                            <option value="">선택안함</option>
                            <option value="cover">커버 (타이틀용)</option>
                            <option value="numbered_list">번호 리스트 (목차용)</option>
                            <option value="divider">디바이더 (간지용)</option>
                            <option value="single_column">단일 컬럼</option>
                            <option value="two_column">2단 컬럼</option>
                            <option value="grid">카드 그리드</option>
                            <option value="closing">마무리</option>
                        </select>
                    </div>
                    <div class="meta-field">
                        <label><input type="checkbox" id="metaHasTitle" onchange="updateSlideMeta()"> 제목 포함</label>
                    </div>
                    <div class="meta-field">
                        <label><input type="checkbox" id="metaHasGovernance" onchange="updateSlideMeta()"> 거버넌스 포함</label>
                    </div>
                    <div class="meta-field">
                        <label>설명 텍스트 수</label>
                        <input type="number" id="metaDescCount" value="0" min="0" max="10" onchange="updateSlideMeta()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 새 템플릿 모달 -->
    <div class="modal-overlay" id="newTemplateModal" style="display:none;">
        <div class="modal">
            <h2>새 템플릿 생성</h2>
            <div class="form-group">
                <label>템플릿 이름</label>
                <input type="text" id="newTemplateName" placeholder="예: 기업 보고서">
            </div>
            <div class="form-group">
                <label>설명</label>
                <textarea id="newTemplateDesc" placeholder="템플릿 설명을 입력하세요"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('newTemplateModal')">취소</button>
                <button class="btn btn-primary" onclick="createTemplate()">생성</button>
            </div>
        </div>
    </div>

    <!-- 폰트 관리 모달 -->
    <div class="modal-overlay" id="fontManageModal" style="display:none;">
        <div class="modal" style="max-width:600px;">
            <h2>폰트 관리</h2>

            <!-- 등록된 폰트 목록 -->
            <div style="margin-bottom:16px;">
                <h3 style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px;">등록된 폰트</h3>
                <div id="fontListContainer" style="max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:6px;">
                    <div style="padding:16px;text-align:center;color:#999;font-size:13px;">등록된 폰트가 없습니다</div>
                </div>
            </div>

            <!-- 프리셋 선택 -->
            <div class="form-group">
                <label>프리셋 (자주 사용되는 웹 폰트)</label>
                <select id="fontPreset" onchange="applyFontPreset(this.value)">
                    <option value="">직접 입력</option>
                    <option value="pretendard">Pretendard</option>
                    <option value="notosanskr">Noto Sans KR</option>
                    <option value="nanumgothic">나눔고딕 (NanumGothic)</option>
                    <option value="nanummyeongjo">나눔명조 (NanumMyeongjo)</option>
                    <option value="spoqahansansneo">Spoqa Han Sans Neo</option>
                    <option value="ibmplexsanskr">IBM Plex Sans KR</option>
                </select>
            </div>

            <!-- 새 폰트 입력 -->
            <div class="form-group">
                <label>표시 이름</label>
                <input type="text" id="newFontName" placeholder="예: Pretendard">
            </div>
            <div class="form-group">
                <label>Font Family (CSS)</label>
                <input type="text" id="newFontFamily" placeholder="예: Pretendard">
            </div>
            <div class="form-group">
                <label>웹 폰트 URL (선택)</label>
                <input type="text" id="newFontUrl" placeholder="예: https://fonts.googleapis.com/css2?family=...">
                <div style="font-size:11px;color:#999;margin-top:2px;">Google Fonts, CDN URL 등. 비워두면 시스템 폰트 사용</div>
            </div>

            <!-- 프리뷰 -->
            <div id="fontPreviewArea" style="display:none;padding:12px;background:#f8f9fa;border-radius:6px;margin-bottom:16px;">
                <p id="fontPreviewText" style="font-size:18px;margin:0;">가나다라마바사 ABCDEF 1234567890</p>
            </div>

            <div class="modal-actions">
                <button class="btn" onclick="closeModal('fontManageModal')">닫기</button>
                <button class="btn btn-primary" onclick="addNewFont()">추가</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/admin/js/admin.js"></script>
</body>
</html>
